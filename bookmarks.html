<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unshackle Bookmarks</title>
  <link rel="stylesheet" href="bookmarks.css" />
  <script defer src="hk-proxy.js"></script>
  <script defer src="bookmarks.js"></script>
</head>
<body data-theme="contrast">
  <div class="page">
    <header class="page-header">
      <div class="header-meta">
        <h1>Bookmarks</h1>
        <p class="header-subtitle">Quick access to your saved series and recent updates.</p>
      </div>
      <button id="refreshBtn" class="ghost-btn" type="button">Refresh</button>
    </header>
    <main class="content" id="contentRoot">
      <section id="emptyState" class="empty" hidden>
        <p>No bookmarks saved yet.</p>
        <p>Add a bookmark from Manga mode to see it here.</p>
      </section>
      <ul id="bookmarkList" class="bookmark-list"></ul>
      <section id="updatesPanel" class="updates" hidden>
        <div class="updates-header">
          <h2 id="updatesTitle">Recent updates</h2>
          <button id="closeUpdates" class="ghost-btn" type="button">Close</button>
        </div>
        <div id="updatesStatus" class="updates-status" aria-live="polite"></div>
        <ul id="updatesList" class="updates-list"></ul>
      </section>
    </main>
  </div>
</body>
</html>
